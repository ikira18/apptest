<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>برامج بلس - كيرا</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: #07071a;
      min-height: 100vh;
      padding: 20px 15px 60px;
      overflow-x: hidden;
    }

    /* خلفية نجوم */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(72,52,200,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(30,90,200,0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(10,10,40,0.9) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ═══════════════ هيدر ═══════════════ */
    .header {
      background: linear-gradient(135deg,
        rgba(90,150,255,0.13),
        rgba(130,80,255,0.13));
      border: 1px solid rgba(120,170,255,0.22);
      border-radius: 24px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 24px;
      backdrop-filter: blur(12px);
      animation: fadeDown 0.6s ease both;
    }

    .header h1 {
      color: #fff;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.5;
      margin-bottom: 16px;
      text-shadow: 0 2px 12px rgba(100,140,255,0.4);
    }

    .channel-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 8px 18px;
    }

    .channel-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(120,170,255,0.4);
    }

    .channel-name {
      color: #b0b8d8;
      font-size: 14px;
      font-weight: 700;
    }

    /* ═══════════════ شبكة التطبيقات ═══════════════ */
    .apps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    /* إذا كان عدد التطبيقات فردي، الكارد الأخير يأخذ العرض الكامل */
    .app-card:last-child:nth-child(odd) {
      grid-column: 1 / -1;
      max-width: 50%;
      margin: 0 auto;
      width: 100%;
    }

    /* ═══════════════ كارد ═══════════════ */
    .app-card {
      background: linear-gradient(160deg, #1a1a3e 0%, #11112a 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 20px 14px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .app-card:nth-child(1) { animation-delay: 0.1s; }
    .app-card:nth-child(2) { animation-delay: 0.2s; }
    .app-card:nth-child(3) { animation-delay: 0.3s; }
    .app-card:nth-child(4) { animation-delay: 0.4s; }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(130,170,255,0.7),
        transparent);
    }

    /* توهج خلف الكارد */
    .app-card::after {
      content: '';
      position: absolute;
      top: -30px; left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(80,120,255,0.12);
      filter: blur(20px);
      pointer-events: none;
    }

    .app-icon {
      width: 74px;
      height: 74px;
      border-radius: 18px;
      margin: 0 auto 12px;
      display: block;
      object-fit: cover;
      box-shadow:
        0 4px 16px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.08);
      position: relative;
      z-index: 1;
    }

    .app-name {
      color: #ffffff;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .app-note {
      color: #00d4ff;
      font-size: 11px;
      line-height: 1.5;
      margin-bottom: 14px;
      min-height: 14px;
      position: relative;
      z-index: 1;
    }

    .install-btn {
      display: block;
      background: linear-gradient(135deg, #5ab0ff 0%, #0055ff 100%);
      color: #fff;
      padding: 11px 8px;
      border-radius: 13px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.3px;
      box-shadow:
        0 4px 14px rgba(0,80,255,0.4),
        inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      z-index: 1;
    }

    .install-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(0,80,255,0.3);
    }

    /* ═══════════════ فوتر ═══════════════ */
    .footer {
      text-align: center;
      color: #555;
      font-size: 12px;
      margin: 8px 0 24px;
      line-height: 1.8;
    }

    .footer a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: 700;
    }

    /* ═══════════════ زر تيليجرام ═══════════════ */
    .telegram-wrap {
      display: flex;
      justify-content: center;
    }

    .telegram-btn {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, #2aabee, #1a85c5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 26px;
      box-shadow:
        0 4px 20px rgba(34,158,217,0.45),
        0 0 0 1px rgba(255,255,255,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .telegram-btn:active {
      transform: scale(0.9);
      box-shadow: 0 2px 10px rgba(34,158,217,0.3);
    }

    /* ═══════════════ أنيميشن ═══════════════ */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- ══════════ هيدر ══════════ -->
  <div class="header">
    <h1>برامج بلس موقعه على شهادة مجانية</h1>
    <div class="channel-row">
      <!-- غيّر src لأيقونة قناتك -->
      <img class="channel-avatar"
           src="https://via.placeholder.com/34/ff6600/fff?text=A"
           alt="avatar">
      <span class="channel-name">قناة اترهيب الرسمية</span>
    </div>
  </div>

  <!-- ══════════ التطبيقات ══════════ -->
  <div class="apps-grid">

    <!-- ① AirMovie -->
    <div class="app-card">
      <img class="app-icon"
           src="https://via.placeholder.com/74/0066ff/fff?text=Air"
           alt="AirMovie">
      <div class="app-name">AirMovie</div>
      <div class="app-note"></div>
      <a class="install-btn"
         href="itms-services://?action=download-manifest&url=https://ikira18.github.io/apptest/manifest-airmovie.plist">
        تثبيت
      </a>
    </div>

    <!-- ② سينمانا -->
    <div class="app-card">
      <img class="app-icon"
           src="https://via.placeholder.com/74/cc0000/fff?text=C"
           alt="Cinema">
      <div class="app-name">سينمانا</div>
      <div class="app-note"></div>
      <a class="install-btn"
         href="itms-services://?action=download-manifest&url=https://ikira18.github.io/apptest/manifest-cinema.plist">
        تثبيت
      </a>
    </div>

    <!-- ③ HiTV -->
    <div class="app-card">
      <img class="app-icon"
           src="https://via.placeholder.com/74/ff6600/fff?text=Hi"
           alt="HiTV">
      <div class="app-name">HiTV</div>
      <div class="app-note"></div>
      <a class="install-btn"
         href="itms-services://?action=download-manifest&url=https://ikira18.github.io/apptest/manifest-hitv.plist">
        تثبيت
      </a>
    </div>

  </div>

  <!-- ══════════ فوتر ══════════ -->
  <div class="footer">
    مطوّر.مؤسسة غير موثوق فيه &nbsp;
    <a href="https://t.me/YOUR_CHANNEL">إضغط هنا شاهد الشرح</a>
  </div>

  <!-- ══════════ تيليجرام ══════════ -->
  <div class="telegram-wrap">
    <a class="telegram-btn" href="https://t.me/YOUR_CHANNEL">✈️</a>
  </div>

</div>
</body>
</html>
